<div class="modal" id="order-item-modal" aria-hidden="true">
    <div class="modal-backdrop" data-modal-close></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="order-item-modal-title">
        <div class="modal-header">
            <div>
                <div class="section-label">Nová položka</div>
                <h3 id="order-item-modal-title">Přidání položky objednávky</h3>
            </div>
            <button type="button" class="modal-close" data-modal-close>&times;</button>
        </div>
        <form method="post" class="modal-form" id="order-item-modal-form">
            <div class="modal-errors" data-modal-errors></div>
            <div class="field-grid modal-field-grid-order-item">
                <div class="field-group field-group-wide{% if item_modal_form.raised_bed.errors %} has-error{% endif %}">
                    <label for="{{ item_modal_form.raised_bed.id_for_label }}">{{ item_modal_form.raised_bed.label }}</label>
                    <div class="input-with-action input-with-action-inline input-with-action-compact">
                        {{ item_modal_form.raised_bed }}
                        <button type="button" class="button button-secondary button-nowrap" data-open-raised-bed-from-item>Přidat záhon</button>
                    </div>
                </div>
                <div class="field-group{% if item_modal_form.quantity.errors %} has-error{% endif %}">
                    <label for="{{ item_modal_form.quantity.id_for_label }}">{{ item_modal_form.quantity.label }}</label>
                    <div class="input-with-suffix">
                        {{ item_modal_form.quantity }}
                        <span class="input-suffix">ks</span>
                    </div>
                </div>
                <div class="field-group{% if item_modal_form.unit_price.errors %} has-error{% endif %}">
                    <label for="{{ item_modal_form.unit_price.id_for_label }}">{{ item_modal_form.unit_price.label }}</label>
                    {{ item_modal_form.unit_price }}
                </div>
            </div>
            <div class="modal-actions">
                <button type="button" class="button button-secondary" data-modal-close>Zavřít</button>
                <button type="submit" class="button button-primary">Přidat položku</button>
            </div>
        </form>
    </div>
</div>
