<div class="modal" id="customer-modal" aria-hidden="true">
    <div class="modal-backdrop" data-modal-close></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="customer-modal-title">
        <div class="modal-header">
            <h3 id="customer-modal-title" class="modal-title">Přidání zákazníka</h3>
            <button type="button" class="modal-close" data-modal-close>&times;</button>
        </div>
        <form method="post" class="modal-form" id="customer-modal-form" action="{% url 'home:customer-modal-create' %}">
            {% csrf_token %}
            <div class="modal-errors" data-modal-errors></div>
            <div class="field-grid modal-field-grid">
                {% for field in customer_form %}
                    <div class="field-group{% if field.name == 'city' or field.name == 'note' %} field-group-wide{% endif %}{% if field.errors %} has-error{% endif %}">
                        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                    </div>
                {% endfor %}
            </div>
            <div class="modal-actions">
                <button type="button" class="button button-secondary" data-modal-close>Zavřít</button>
                <button type="submit" class="button button-primary">Uložit</button>
            </div>
        </form>
    </div>
</div>
